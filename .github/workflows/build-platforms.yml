name: Build Platforms (Android APK & Windows EXE)

on:
  push:
    branches:
      - main
      - master
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Web Application
        run: npm run build

      - name: Upload Built Web Assets
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  build-windows:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Download Built Web Assets
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Install Electron Builder
        run: npm install --no-save electron electron-builder

      - name: Build Windows Portable EXE
        run: npx electron-builder --win --x64

      - name: Upload Windows Executable (EXE)
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Executable
          path: dist-electron/*.exe

  build-android:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Download Built Web Assets
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Install Capacitor CLI & Android Platform
        run: |
          npm install --no-save @capacitor/core @capacitor/cli @capacitor/android
          npx cap init Notes com.notescopilot.app --web-dir=dist
          npx cap add android

      - name: Fix Kotlin Duplicate Classes Conflict
        run: |
          node -e '
          const fs = require("fs");
          const file = "android/app/build.gradle";
          if (fs.existsSync(file)) {
            let content = fs.readFileSync(file, "utf8");
            content += "\n\nconfigurations.all {\n    exclude group: \"org.jetbrains.kotlin\", module: \"kotlin-stdlib-jdk7\"\n    exclude group: \"org.jetbrains.kotlin\", module: \"kotlin-stdlib-jdk8\"\n}\n";
            fs.writeFileSync(file, content, "utf8");
            console.log("Successfully patched app/build.gradle to resolve duplicate Kotlin classes");
          } else {
            console.error("Error: android/app/build.gradle not found");
            process.exit(1);
          }
          '

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
